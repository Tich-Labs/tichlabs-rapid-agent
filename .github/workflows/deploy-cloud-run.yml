name: Deploy to Cloud Run

on:
  workflow_dispatch:

env:
  PROJECT_ID: sgbv-incidenttracker
  REGION: us-central1
  AR_REPO_FRONTEND: tichlabs-frontend
  AR_REPO_MCP: tichlabs-mcp
  FRONTEND_SERVICE: tichlabs-sgbv-frontend
  MCP_SERVICE: tichlabs-sgbv-mcp

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create Artifact Registry repos (if missing)
        run: |
          gcloud artifacts repositories create ${{ env.AR_REPO_FRONTEND }} \
            --project ${{ env.PROJECT_ID }} \
            --location ${{ env.REGION }} \
            --repository-format docker \
            --quiet || true
          gcloud artifacts repositories create ${{ env.AR_REPO_MCP }} \
            --project ${{ env.PROJECT_ID }} \
            --location ${{ env.REGION }} \
            --repository-format docker \
            --quiet || true

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push frontend image
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO_FRONTEND }}/frontend
          docker build frontend/ \
            --build-arg VITE_MCP_SERVER_URL="${{ secrets.VITE_MCP_SERVER_URL }}" \
            --build-arg VITE_MCP_API_KEY="${{ secrets.VITE_MCP_API_KEY }}" \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest
          docker push $IMAGE --all-tags

      - name: Deploy frontend to Cloud Run
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO_FRONTEND }}/frontend
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --image $IMAGE:${{ github.sha }} \
            --allow-unauthenticated \
            --memory 256Mi \
            --min-instances 0 \
            --max-instances 2 \
            --cpu 1 \
            --concurrency 80

      - name: Show frontend URL
        run: |
          URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --format='value(status.url)')
          echo "### Frontend → $URL" >> $GITHUB_STEP_SUMMARY

  deploy-mcp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create Artifact Registry repo (if missing)
        run: |
          gcloud artifacts repositories create ${{ env.AR_REPO_MCP }} \
            --project ${{ env.PROJECT_ID }} \
            --location ${{ env.REGION }} \
            --repository-format docker \
            --quiet || true

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push MCP server image
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO_MCP }}/mcp-server
          docker build mcp-server/ \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest
          docker push $IMAGE --all-tags

      - name: Deploy MCP server to Cloud Run
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO_MCP }}/mcp-server
          gcloud run deploy ${{ env.MCP_SERVICE }} \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --image $IMAGE:${{ github.sha }} \
            --allow-unauthenticated \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 2 \
            --cpu 1 \
            --concurrency 80 \
            --set-env-vars "MCP_TRANSPORT=http,GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},GEMINI_MODEL=${{ secrets.GEMINI_MODEL }},MONGODB_URI=${{ secrets.MONGODB_URI }},MONGODB_DB_NAME=tichlabs_cases,MCP_API_KEY=${{ secrets.MCP_API_KEY }}"

      - name: Show MCP server URL
        run: |
          URL=$(gcloud run services describe ${{ env.MCP_SERVICE }} \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --format='value(status.url)')
          echo "### MCP Server → $URL" >> $GITHUB_STEP_SUMMARY
          echo "MCP_SERVER_URL=$URL" >> $GITHUB_ENV
